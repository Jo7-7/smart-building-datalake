services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}; do
        echo 'En attente de MinIO...'; sleep 2;
      done;
      mc mb --ignore-existing local/raw;
      echo 'Bucket raw pret';
      "

  pipeline:
    build: .
    container_name: pipeline
    env_file: .env
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - "C:/Users/josue/Desktop/Efrei/I2 - app/Semestre 8/Datalakes and Data Integration/Projet/smart-building-datalake/credentials:/app/credentials:ro"
      - "C:/Users/josue/Desktop/Efrei/I2 - app/Semestre 8/Datalakes and Data Integration/Projet/smart-building-datalake/data:/app/data:ro"

  api:
    build: .
    env_file: .env
    entrypoint: ["uvicorn"]
    command: ["api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./credentials:/app/credentials:ro
      - ./data:/app/data:ro

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "smart-building-secret-key-2026"
      AIRFLOW__CORE__FERNET_KEY: "RXhhbXBsZUZlcm5ldEtleU5vdFNlY3VyZTEyMzQ1Njc4OTA="
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      airflow users create --username airflow --password airflow
      --firstname admin --lastname admin --role Admin --email admin@example.com
      "
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - airflow-init
    user: "0:0"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "smart-building-secret-key-2026"
      AIRFLOW__CORE__FERNET_KEY: "RXhhbXBsZUZlcm5ldEtleU5vdFNlY3VyZTEyMzQ1Njc4OTA="
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: airflow webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - airflow-init
    user: "0:0"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "smart-building-secret-key-2026"
      AIRFLOW__CORE__FERNET_KEY: "RXhhbXBsZUZlcm5ldEtleU5vdFNlY3VyZTEyMzQ1Njc4OTA="
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler

volumes:
  postgres-data: